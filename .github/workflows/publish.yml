name: Publish to PyPI

# Publishes on a version tag (e.g. v0.2.0) using PyPI Trusted Publishing
# (OIDC) — no API token needed. One-time setup on PyPI:
#   PyPI project -> Settings -> Publishing -> add this repo + workflow as a
#   trusted publisher. See https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
